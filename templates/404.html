{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="col-md-6 text-center">
            <h1 style="font-size: 6rem; font-weight: 700; color: #dee2e6;">404</h1>
            <h2 class="mb-3" style="color: var(--geo-dark-blue); font-weight: 700;">Page Not Found</h2>
            <p class="mb-4" style="color: var(--geo-dark-blue); opacity: 0.8;">
                The page you are looking for doesn't exist or has been moved.
            </p>
            <a href="{{ url_for('index') }}" class="btn btn-geo-primary px-4 py-2">Return Home</a>
        </div>
    </div>
</div>
{% endblock %}
