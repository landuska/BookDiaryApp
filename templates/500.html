{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="col-md-6 text-center">
            <h1 style="font-size: 6rem; font-weight: 700; color: #ffc107;">500</h1>
            <h2 class="mb-3">Something went wrong</h2>
            <p class="text-muted mb-4">
                We're experiencing an internal server problem.<br>Please try again later.
            </p>
            <div class="d-flex justify-content-center gap-2">
                <a href="{{ url_for('index') }}" class="btn btn-outline-dark px-4 py-2">Home</a>
                <button onclick="location.reload()" class="btn btn-primary px-4 py-2">Try Again</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
