{% extends "base.html" %}

{% block title %}Authors{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row mb-4">
        <div class="col-12">
            <a href="{{ url_for('index') }}" class="btn btn-link text-decoration-none text-muted p-0">
                &larr; Back to Home
            </a>
        </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="geo-page-title">Authors</h2>
    </div>
    <div class="row">
        {% if authors %}
        {% for author in authors %}
        <div class="col-md-4 col-lg-3 mb-3">
            <div class="card border-0 shadow-sm h-100 author-card"
                 style="border-radius: 16px; padding: 16px;">
                <div class="card-body text-center p-3">
                    <h6 class="mb-0 fw-bold" style="color: var(--geo-dark-blue);">
                        {{ author.author_name }}
                    </h6>
                </div>
                <a href="{{ url_for('books_by_author', author_id=author.author_id) }}"
                   class="btn btn-geo-primary btn-sm w-100 fw-bold"
                   style="border-radius: 10px; font-size: 0.75rem;">
                    View Books
                </a>
            </div>
        </div>
        {% endfor %}
        {% else %}
        <div class="col-12 text-center py-5">
            <p class="text-muted">No authors found in the database.</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
