{% extends "base.html" %}

{% block title %}Book Clubs{% endblock %}

{% block content %}
<div class="container py-5">
        <div class="row mb-4">
        <div class="col-12">
            <a href="{{ url_for('index') }}" class="btn btn-link text-decoration-none text-muted p-0">
                &larr; Back to Home
            </a>
        </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">All Book Clubs</h2>
    </div>

    <div class="row">
        {% for community in communities %}
        <div class="col-md-4 mb-4">
            <div class="card border-0 shadow-sm p-3" style="border-radius: 15px;">
                <div class="d-flex align-items-center">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <div class="ms-3">
                        <h5 class="mb-0 fw-bold">{{ community.community_name }}</h5>
                        <small class="text-muted">{{ community.list_of_members|length }} members</small>

<div class="mt-3">
<a href="{{ url_for('community_info', community_id=community.community_id) }}"
                           class="btn btn-outline-primary w-100 fw-bold"
                           style="border-radius: 12px;">
                            View Info
                        </a>
</div>
                    </div>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
