{% extends "base.html" %}

{% block title %}Book Clubs{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row mb-4">
        <div class="col-12">
            <a href="{{ url_for('index') }}" class="btn btn-link text-decoration-none text-muted p-0">
                &larr; Back to Home
            </a>
        </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">All Book Clubs</h2>
    </div>

    <div class="row">
        {% for community in communities %}
        <div class="col-md-4 col-lg-3 mb-3">

            <div class="card border-0 shadow-sm h-100 transition-card"
                 style="border-radius: 16px;">

                <div class="card-body text-center p-3">
                    <div class="mb-3">
                        <img src="https://api.dicebear.com/9.x/shapes/svg?seed={{ community.community_name }}"
                             width="48" height="48"
                             style="border-radius: 12px;">
                    </div>

                    <div class="ms-3">
                        <h6 class="fw-bold mb-2" style="color: var(--geo-dark-blue);">
                            {{ community.community_name }}
                        </h6>
                        <p class="text-muted small mb-3" style="font-size: 0.75rem;">
                            {{community.list_of_members | length }} members
                        </p>
                        <a href="{{ url_for('community_info', community_id=community.community_id) }}"
                           class="btn btn-geo-primary btn-sm w-100"
                           style="border-radius: 12px; font-size: 0.75rem;">
                            Enter Club
                        </a>
                    </div>
                </div>
            </div>
        </div>

        {% endfor %}
    </div>
</div>
<style>
    .transition-card {
        transition: all 0.25s ease;
    }
    .transition-card:hover {
        transform: translateY(-5px);
    }
</style>
{% endblock %}
