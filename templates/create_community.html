{% extends "base.html" %}

{% block title %}Create Community{% endblock %}

{% block content %}
<div class="container py-5">

    <div class="row mb-4">
        <div class="col-md-6 mx-auto">
            <a href="{{ url_for('all_communities') }}"
               class="btn btn-link text-decoration-none p-0"
               style="color: var(--geo-dark-blue);">
                &larr; Back to Communities
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card border-0 shadow-sm"
                 style="border-radius: 24px; overflow: hidden;
                        border: 2px solid var(--geo-pastel);
                        background: #ffffff;">

                <div class="text-center p-4"
                     style="background: linear-gradient(135deg,
                            var(--geo-dark-blue),
                            var(--geo-light-blue));
                            color: white;">


                    <i class=" display-6 mb-2 geo-icon" data-lucide="users" style="color: #ffffff"></i>

                    <h3 class="fw-bold mb-0">New Book Club</h3>
                    <p class="small opacity-75 mb-0">Connect with other readers</p>
                </div>

                <div class="card-body p-4 p-lg-5">

                    <form action="{{ url_for('create_community') }}" method="POST">

                        <div class="mb-4">
                            <label for="name"
                                   class="form-label small fw-bold text-uppercase"
                                   style="color: var(--geo-dark-blue);">
                                Club Name
                            </label>

                            <input type="text"
                                   class="form-control form-control-lg"
                                   id="name"
                                   name="name"
                                   placeholder="e.g. Classic Literature Enthusiasts"
                                   required
                                   style="border-radius: 12px;
                                          border: 1px solid var(--geo-pastel);
                                          background: #ffffff;">
                        </div>

                        <div class="mb-4">
                            <label for="about"
                                   class="form-label small fw-bold text-uppercase"
                                   style="color: var(--geo-dark-blue);">
                                Description
                            </label>

                            <textarea class="form-control"
                                      id="about"
                                      name="about"
                                      rows="4"
                                      placeholder="Describe your club's goals, what you read, and who can join..."
                                      style="border-radius: 12px;
                                             border: 1px solid var(--geo-pastel);
                                             background: #ffffff;
                                             resize: none;"></textarea>
                        </div>

                        <div class="p-3 mb-4"
                             style="border-radius: 12px;
                                    border-left: 4px solid var(--geo-orange);
                                    background: #ffffff;
                                    border: 1px solid var(--geo-pastel);">

                            <p class="mb-0 small">
                                <strong style="color: var(--geo-dark-blue);">Note:</strong>
                                As the founder, you will be automatically added to the club.
                            </p>
                        </div>

                        <div class="d-grid">
                            <button type="submit"
                                    class="btn fw-bold shadow-sm"
                                    style="border-radius: 15px;
                                           background: var(--geo-dark-blue);
                                           color: white;">
                                Create Community
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<style>
    .form-control:focus {
        box-shadow: 0 0 0 0.25rem rgba(12, 87, 132, 0.15) !important;
        border: 1px solid var(--geo-light-blue) !important;
    }
</style>

{% endblock %}
