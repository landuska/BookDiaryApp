{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="text-center col-md-6">

        <div class="mb-5">
            <h1 class="display-4 fw-bold" style="color: var(--geo-dark-blue);">
                BookClub
            </h1>
            <p class="lead fw-lighter" style="color: var(--geo-orange);">
                The simplest way to track your library, rate your reads,
                and connect with book communities
            </p>
        </div>

        <div class="card shadow-sm border-0 p-4"
             style="background: #ffffff;
            border-radius: 16px;
            border: 2px solid var(--geo-pastel);">
            <h5 class="mb-4 fw-bold" style="color: var(--geo-dark-blue);">
                Sign In to Your Account
            </h5>
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control"
                           style="border: 1px solid var(--geo-pastel);
       background: #ffffff;" placeholder="Username" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control"
                           style="border: 1px solid var(--geo-pastel);
       background: #ffffff;" placeholder="Password" required>
                </div>
                <button type="submit"
                        class="btn btn-geo-primary w-100 py-2 fw-bold"
                        style="border-radius: 10px;">Login
                </button>
            </form>
            <div class="mt-3">
                <small>New user? <a href="{{ url_for('register') }}"
                                    class="text-decoration-none fw-bold"
                                    style="color: var(--geo-orange);">Create an account</a></small>
            </div>
        </div>

    </div>
</div>
{% endblock %}
